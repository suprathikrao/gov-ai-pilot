services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: govai
      POSTGRES_PASSWORD: govai_password
      POSTGRES_DB: govai_copilot
    ports:
      - "5432:5432"
    volumes:
      - govai_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U govai"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - govai_qdrant_data:/qdrant/storage

  backend:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  govai_pg_data:
  govai_qdrant_data:
